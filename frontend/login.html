<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ApoyoEstudiantil - Iniciar Sesión</title>
    <link rel="stylesheet" href="css/style.css"> </head>
<body>
    <div class="login-container">
        <h2>Bienvenido a ApoyoEstudiantil</h2>
        <p>Introduce tus credenciales para acceder a tu espacio de aprendizaje</p>
        
        <div id="mensaje-error" class="error-box" style="display: none;"></div>

        <form id="login-form">
            <div class="form-group">
                <label for="correo">Correo Electrónico:</label>
                <input type="email" id="correo" required placeholder="ejemplo@correo.com">
            </div>

            <div class="form-group">
                <label for="clave">Contraseña:</label>
                <input type="password" id="clave" required placeholder="********">
            </div>

            <button type="submit" id="btn-login">Ingresar</button>
        </form>
    </div>

    <script src="js/login.js"></script>
</body>
</html>
