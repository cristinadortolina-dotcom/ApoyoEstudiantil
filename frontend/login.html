<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ApoyoEstudiantil | Iniciar Sesión</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="header">
                <h1>ApoyoEstudiantil 🚀</h1>
                <p>Tu espacio para organizar, aprender y crecer.</p>
            </div>

            <form id="loginForm">
                <div class="input-group">
                    <label for="correo">Correo Electrónico</label>
                    <input type="email" id="correo" placeholder="estudiante@ejemplo.com" required>
                </div>

                <div class="input-group">
                    <label for="contraseña">Contraseña</label>
                    <input type="password" id="contraseña" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn-primary">Ingresar</button>
            </form>

            <div class="footer">
                <p>¿Eres nuevo por aquí? <a href="registro.html">Regístrate</a></p>
            </div>
        </div>
    </div>
    
    <script src="login.js"></script>
</body>
</html>
