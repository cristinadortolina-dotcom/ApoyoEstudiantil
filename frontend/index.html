<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apoyo Estudiantil - Gestión Emocional</title>
    <link rel="stylesheet" href="style.css">

    <script>
        // Verificamos si el usuario tiene una sesión activa
        const usuarioId = localStorage.getItem('usuario_id');
        
        if (!usuarioId) {
            // Si no hay sesión, puedes decidir a dónde enviarlo.
            // Si quieres que vean una página de bienvenida antes, podrías crear un 'bienvenida.html'
            // Por ahora, lo enviaremos a registrar.html como tenías configurado:
            window.location.href = 'registrar.html';
        }
    </script>
</head>
<body>
    
    <div class="chat-container">
        <header class="chat-header">
            <div class="header-top">
                <h2>🧠 Apoyo Estudiantil LUZ</h2>
                <button id="btn-logout" class="logout-btn">Cerrar Sesión</button>
            </div>
            <p>¿Cómo te sientes hoy? Cuéntame tu día, tus dudas o tu estrés.</p>
        </header>

        <div class="chat-box" id="chatBox">
            <div class="message system-message">
                🤖 ¡Hola! Estoy aquí para escucharte y ayudarte a gestionar tus emociones académicas. ¿De qué te gustaría hablar?
            </div>
        </div>

        <div class="chat-input-area">
            <input type="text" id="userInput" placeholder="Escribe aquí cómo te sientes..." autocomplete="off">
            <button id="sendBtn">Enviar</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
