<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>ApoyoEstudiantil - Test</title>
    <link rel="stylesheet" href="test.css">
</head>
<body class="theme-test">
<div class="container">
    <div id="testScreen">
        <h1>Evaluación de Áreas Cognitivas</h1>
        <form id="cognitiveTestForm">
            <div id="preguntasContainer"></div>

            <div class="question-block">
                <p>10. ¿En cuál de estas dimensiones experimentas mayor bloqueo?</p>
                <div class="options-group">
                    <label class="option-label"><input type="radio" name="bloqueo" value="Logico" required> Lógico</label>
                    <label class="option-label"><input type="radio" name="bloqueo" value="Textos" required> Textos</label>
                    <label class="option-label"><input type="radio" name="bloqueo" value="Tiempo" required> Tiempo</label>
                    <label class="option-label"><input type="radio" name="bloqueo" value="Atencion" required> Atención</label>
                </div>
            </div>

            <div class="question-block">
                <p>11. ¿Cómo calificarías el nivel de impacto?</p>
                <div class="options-group">
                    <label class="option-label"><input type="radio" name="nivel" value="Inicial" required> Inicial</label>
                    <label class="option-label"><input type="radio" name="nivel" value="Intermedio" required> Intermedio</label>
                    <label class="option-label"><input type="radio" name="nivel" value="Avanzado" required> Avanzado</label>
                </div>
            </div>

            <div class="question-block">
                <label>¿Cuál es tu propósito de estudio?</label>
                <textarea name="proposito" required style="width:100%; height:60px; margin-top:10px;"></textarea>
            </div>

            <button type="submit" class="btn-action">Finalizar Test</button>
        </form>
    </div>

    <div id="resultsScreen" style="display: none;">
    <h2>Tus Resultados de la Evaluación</h2>
    <div id="diagnostico-container" class="diagnostico-panel" style="display: none;">
        <h3>Perfil de Entrenamiento</h3>
        <p id="diagnostico-texto"></p>
    </div>
    <table>
        <thead>
            <tr>
                <th>Dimensión Cognitiva</th>
                <th>Puntuación</th>
                <th>Estado</th>
            </tr>
        </thead>
        <tbody id="resultsTableBody">
            </tbody>
    </table>

    <div id="contenedor-ejercicios"></div>
    <div class="actions-container">
        <button id="btnVolverInicio" class="btn-inicio">🏠 Volver al Inicio</button>
    </div>
</div>

<script>
    const bancoPreguntas = [
        "1. Mantengo el foco en clases teóricas sin distraerme.",
        "2. Puedo continuar enfocado en problemas complejos sin frustrarme.",
        "3. Al estudiar conceptos nuevos, logro recordarlos días después.",
        "4. Retengo instrucciones complejas mientras ejecuto otras tareas.",
        "5. Logro priorizar deberes ante fechas de entrega cercanas.",
        "6. Desgloso proyectos grandes en subtareas manejables.",
        "7. Modifico mi estrategia de estudio si los resultados no son óptimos.",
        "8. Estimo con realismo el tiempo necesario para mis tareas.",
        "9. Estructuro mis apuntes visualmente de manera ordenada."
    ];

    const container = document.getElementById('preguntasContainer');
    bancoPreguntas.forEach((pregunta, index) => {
        container.innerHTML += `
            <div class="question-block">
                <p>${pregunta}</p>
                <div class="options-group">
                    ${['Nunca','Raramente','A veces','Frecuentemente','Siempre'].map(op => `
                        <label class="option-label"><input type="radio" name="p${index+1}" value="${op}" required> ${op}</label>
                    `).join('')}
                </div>
            </div>
        `;
    });

    document.getElementById('cognitiveTestForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        // Obtenemos el ID real almacenado cuando la persona hizo login
        const usuarioActivoId = localStorage.getItem("usuario_id");
        if (!usuarioActivoId) {
            alert("Tu sesión ha expirado o no has iniciado sesión. Serás redirigido.");
            window.location.href = "login.html";
            return;
        }

        const formData = new FormData(e.target);
        const respuestas = {};
        for(let i=1; i<=9; i++) respuestas[`p${i}`] = formData.get(`p${i}`);

        const payload = {
            usuario_id: usuarioActivoId, // <--- AHORA USA EL ID VERDADERO
            respuestas: respuestas,
            bloqueo: formData.get('bloqueo'),
            nivel: formData.get('nivel'),
            proposito: formData.get('proposito')
        };

        const res = await fetch('http://127.0.0.1:5000/api/cognitivo/evaluar', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(payload)
        });
        
        const data = await res.json();
        
        if(data.status === 'success') {
            document.getElementById('testScreen').style.display = 'none';
            document.getElementById('resultsScreen').style.display = 'block';
            
            const tbody = document.getElementById('resultsTableBody');
            tbody.innerHTML = '';
            
            // Generar filas dinámicamente
            for (const [area, info] of Object.entries(data.resultados)) {
                tbody.innerHTML += `
                    <tr>
                        <td><strong>${area}</strong></td>
                        <td>${info.puntuacion} / 5.0</td>
                        <td><span class="${info.estado === 'Fortaleza' ? 'badge-fortaleza' : 'badge-oportunidad'}">
                            ${info.estado}
                        </span></td>
                    </tr>`;
            }

            // =================================================================
            // NUEVA LÓGICA DE AUTOMATIZACIÓN DE EJERCICIOS (Desde Firestore)
            // =================================================================
            const contenedorEjercicios = document.getElementById('contenedor-ejercicios');
            contenedorEjercicios.innerHTML = '<h3>Cargando tu plan de entrenamiento personalizado...</h3>';

            const mapeoCategorias = {
                "Atención": "atencion",
                "Funciones Ejecutivas": "ejecutivas",
                "Memoria": "memoria",
                "Orientación": "orientacion"
            };

            let htmlEjerciciosAcumulado = `<h2>📚 Plan de Estimulación Recomendado</h2>`;
            let tieneOportunidades = false;

            for (const [area, info] of Object.entries(data.resultados)) {
                if (info.estado === 'Oportunidad') {
                    tieneOportunidades = true;
                    const categoriaRuta = mapeoCategorias[area];

                    try {
                        const responseEjercicios = await fetch(`http://127.0.0.1:5000/api/ejercicios/${categoriaRuta}`);
                        const dataEjercicios = await responseEjercicios.json();

                        if (dataEjercicios.status === 'success') {
                            htmlEjerciciosAcumulado += `
                                <div class="seccion-ejercicios-area">
                                    <h3>💡 Ejercicios de refuerzo para: ${area}</h3>
                                    <div class="ejercicios-grid">
                            `;

                            dataEjercicios.data.forEach(ejercicio => {
                                htmlEjerciciosAcumulado += `
                                    <div class="card-ejercicio">
                                        <div class="card-ejercicio-header">
                                            <h4>${ejercicio.nombre}</h4>
                                            <span class="badge-nivel">${ejercicio.nivel}</span>
                                        </div>
                                        <p class="descripcion-ejercicio">${ejercicio.descripcion}</p>
                                        <div class="instruccion-ejercicio">
                                            <strong>Instrucción práctica:</strong> ${ejercicio.instruccion}
                                        </div>
                                        <button class="btn-completar-ejercicio" onclick="alert('¡Excelente trabajo! Ejercicio registrado.')">
                                            Marcar como Realizado
                                        </button>
                                    </div>
                                `;
                            });

                            htmlEjerciciosAcumulado += `</div></div>`;
                        }
                    } catch (err) {
                        console.error(`Error al solicitar ejercicios de ${categoriaRuta}:`, err);
                    }
                }
            }

            if (!tieneOportunidades) {
                htmlEjerciciosAcumulado += `
                    <div class="instruccion-ejercicio" style="border-left-color: #48bb78; background-color: #f0fff4;">
                        <strong>¡Felicitaciones!</strong> Has mantenido un rendimiento óptimo en todas las áreas cognitivas evaluadas hoy. No requieres ejercicios de nivelación inmediatos.
                    </div>
                `;
            }

            contenedorEjercicios.innerHTML = htmlEjerciciosAcumulado;
        }
    });

    // =================================================================
    // MODIFICACIÓN: LÓGICA DEL BOTÓN VOLVER AL INICIO
    // =================================================================
    document.getElementById('btnVolverInicio').addEventListener('click', () => {
        window.location.href = 'index.html'; 
    });
</script>
</body>
</html>
