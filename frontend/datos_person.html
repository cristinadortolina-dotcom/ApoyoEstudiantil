<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ApoyoEstudiantil | Datos personales</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="theme-datos">
    <div class="perfil-card">
        <div class="header-card">
            <h2>👤 Mis Datos Personales</h2>
            <p>Visualiza o edita tu información de perfil estudiantil.</p>
        </div>
    
        <form id="formPerfil">
            <div class="form-group">
                <label for="perfilNombre">Nombre Completo:</label>
                <input type="text" id="perfilNombre" required disabled>
            </div>

            <div class="form-group">
                <label for="perfilCorreo">Correo Electrónico:</label>
                <input type="email" id="perfilCorreo" readonly style="background-color: #E2E8F0; cursor: not-allowed;">
            </div>

            <div class="form-group">
                <label for="perfilNivel">Rango/Nivel Académico:</label>
                <select id="perfilNivel" required disabled>
                    <option value="Bachillerato">Bachillerato</option>
                    <option value="Pregrado">Universitario</option>
                </select>
            </div>

            <div style="margin-top: 20px; display: flex; flex-direction: column; gap: 8px;">
                <button type="button" id="btnEditar" class="btn-primary-card">✏️ Editar Datos</button>
                <button type="submit" id="btnGuardar" class="btn-primary-card" style="display: none; background-color: var(--secondary-color);">💾 Guardar Cambios</button>
                <button type="button" id="btnCancelar" class="btn-volver" style="display: none; background-color: #A0AEC0; color: white;">❌ Cancelar</button>
            </div>
        </form>

        <hr class="divisor">

        <h3 style="font-size: 15px; margin-bottom: 8px;">📋 Plan Cognitivo Activo</h3>
        <div id="planCognitivoContenedor" class="plan-contenedor"></div>

        <div class="perfil-acciones" style="margin-top: 20px;">
            <button id="btnRegresarMenu" class="btn-volver">🏠 Volver al Menú Principal</button>
        </div>
    </div>

    <script src="inicio.js"></script> 
</body>
</html>
